server:
  # Render (y plataformas similares) inyectan la variable PORT en runtime.
  port: ${PORT:8081}

spring:
  application:
    name: board-service

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/taskflow
    username: taskflow
    password: taskflow

  flyway:
    # Flyway no soporta R2DBC directamente, usa JDBC solo para migraciones
    url: jdbc:postgresql://localhost:5432/taskflow
    user: taskflow
    password: taskflow
    locations: classpath:db/migration

app:
  cors:
    # Lista separada por comas. En producción, sobreescribir con la variable
    # de entorno ALLOWED_ORIGINS apuntando al dominio real del frontend.
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
  demo:
    # Este board es un demo público sin login. Estas dos properties limitan el abuso:
    # cuantas tareas puede acumular una misma IP, y cada cuánto se limpia todo a los datos semilla.
    max-tasks-per-ip: ${MAX_TASKS_PER_IP:50}
    # Por defecto, una vez al día a las 03:00 UTC (poco tráfico esperado, es un demo de CV).
    reset-cron: ${DEMO_RESET_CRON:0 0 3 * * *}

logging:
  level:
    org.springframework.r2dbc: INFO
