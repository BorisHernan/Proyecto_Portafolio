<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskflowWeb</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Aplica el tema guardado ANTES de pintar la página, para que no haya
    // un destello blanco mientras carga Angular (debe ir antes que el CSS).
    (function () {
      try {
        var stored = localStorage.getItem('taskflow-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
