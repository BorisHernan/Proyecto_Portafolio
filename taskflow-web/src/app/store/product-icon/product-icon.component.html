<svg
  [attr.width]="size"
  [attr.height]="size"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  [ngSwitch]="icon"
>
  <!-- cup -->
  <g *ngSwitchCase="'cup'">
    <path d="M4 8h12v7a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8Z" />
    <path d="M16 10h1.5a2.5 2.5 0 0 1 0 5H16" />
    <path d="M8 3v2M12 3v2" />
  </g>

  <!-- tag -->
  <g *ngSwitchCase="'tag'">
    <path d="M11 3H4v7l9 9 7-7-9-9Z" />
    <circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none" />
  </g>

  <!-- shirt -->
  <g *ngSwitchCase="'shirt'">
    <path d="M8 4 4 7l2 3 2-1v11h8V9l2 1 2-3-4-3-2 2h-4L8 4Z" />
  </g>

  <!-- key -->
  <g *ngSwitchCase="'key'">
    <circle cx="8" cy="8" r="4" />
    <path d="M11 11 20 20M16 16l2-2M19 19l2-2" />
  </g>

  <!-- mousepad -->
  <g *ngSwitchCase="'mousepad'">
    <rect x="3" y="5" width="18" height="14" rx="2" />
    <circle cx="9" cy="12" r="1.4" fill="currentColor" stroke="none" />
  </g>

  <!-- bottle -->
  <g *ngSwitchCase="'bottle'">
    <path d="M10 3h4v3l2 2v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V8l2-2V3Z" />
    <path d="M8 12h8" />
  </g>

  <!-- notebook -->
  <g *ngSwitchCase="'notebook'">
    <rect x="5" y="3" width="14" height="18" rx="1.5" />
    <path d="M5 7h3M9 11h6M9 15h6" />
  </g>

  <!-- power -->
  <g *ngSwitchCase="'power'">
    <path d="M12 3v7" />
    <path d="M7 6a8 8 0 1 0 10 0" />
  </g>

  <!-- sock -->
  <g *ngSwitchCase="'sock'">
    <path d="M9 3h5v8l4 4a3 3 0 0 1-2 5H8a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" />
  </g>

  <!-- laptop -->
  <g *ngSwitchCase="'laptop'">
    <rect x="4" y="5" width="16" height="10" rx="1.5" />
    <path d="M2 19h20" />
  </g>

  <!-- cushion -->
  <g *ngSwitchCase="'cushion'">
    <rect x="4" y="4" width="16" height="16" rx="6" />
    <path d="M9 9c1 1 5 1 6 0M9 15c1-1 5-1 6 0" />
  </g>

  <!-- fallback: caja generica -->
  <g *ngSwitchDefault>
    <rect x="4" y="7" width="16" height="13" rx="1.5" />
    <path d="M4 11h16M9 7 12 3l3 4" />
  </g>
</svg>
